  const root = document.getElementById('root');
  slides.forEach((slide, i) => {
    const div = document.createElement('div');
    const isCustom = typeof slide === 'object' && (slide.header || slide.headerHtml);
    const isStandaloneImg = typeof slide === 'object' && slide.image && !isCustom;
    const isRevs = typeof slide === 'object' && slide.revs;
    div.className = 'slide' + (isStandaloneImg ? ' image' : '') + (isRevs ? ' revs' : '') + (i === 0 ? ' active' : '');
    if (isRevs) {
      const frame = document.createElement('div');
      frame.className = 'rev-frame';
      const content = document.createElement('pre');
      content.className = 'rev-content';
      frame.appendChild(content);
      div.appendChild(frame);
      div._revs = slide.revs;
      div._revContent = content;
    } else if (isStandaloneImg) {
      const img = document.createElement('img');
      img.src = slide.image;
      img.alt = '';
      div.appendChild(img);
    } else if (isCustom) {
      const h = document.createElement('div');
      h.className = 'header';
      if (slide.headerHtml) h.innerHTML = slide.headerHtml;
      else h.textContent = slide.header;
      div.appendChild(h);
      if (slide.image) {
        const img = document.createElement('img');
        img.src = slide.image;
        img.alt = '';
        img.className = 'slide-image';
        div.appendChild(img);
      }
      if (slide.link) {
        const wrap = document.createElement('div');
        wrap.className = 'link-wrap' + (slide.image ? ' under-image' : '');
        const a = document.createElement('a');
        a.href = slide.link.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = slide.link.label;
        wrap.appendChild(a);
        div.appendChild(wrap);
      }
      if (slide.quote) {
        const q = document.createElement('div');
        q.className = 'quote';
        q.textContent = '“' + slide.quote + '”';
        div.appendChild(q);
      }
      if (slide.body) {
        const b = document.createElement('div');
        b.className = 'body-text';
        b.textContent = slide.body;
        div.appendChild(b);
      }
      if (slide.caption) {
        const c = document.createElement('div');
        c.className = 'caption';
        c.textContent = slide.caption;
        div.appendChild(c);
      }
      if (slide.bullets) {
        const ul = document.createElement('ul');
        ul.className = 'bullets';
        for (const text of slide.bullets) {
          const li = document.createElement('li');
          li.textContent = text;
          ul.appendChild(li);
        }
        div.appendChild(ul);
      }
    } else {
      const lines = slide.split('\n');
      const headerLines = [];
      const bulletLines = [];
      let inBullets = false;
      for (const line of lines) {
        if (/^\s*-/.test(line)) {
          inBullets = true;
          bulletLines.push(line);
        } else if (!inBullets) {
          headerLines.push(line);
        } else {
          bulletLines.push(line);
        }
      }
      if (headerLines.length) {
        const h = document.createElement('div');
        h.className = 'header';
        h.textContent = headerLines.join(' ').trim();
        div.appendChild(h);
      }
      if (bulletLines.length) {
        const ul = document.createElement('ul');
        ul.className = 'bullets';
        for (const line of bulletLines) {
          const m = line.match(/^(\s*)-\s*(.*)$/);
          const li = document.createElement('li');
          if (m) {
            if (m[1].length > 0) li.classList.add('nested');
            li.textContent = m[2];
          } else {
            li.textContent = line;
          }
          ul.appendChild(li);
        }
        div.appendChild(ul);
      }
    }
    root.appendChild(div);
  });

  document.getElementById('total').textContent = slides.length;
  let idx = 0;
  const nodes = document.querySelectorAll('.slide');
  let activeRevTimer = null;
  function stopRevAnim() {
    if (activeRevTimer) { clearInterval(activeRevTimer); activeRevTimer = null; }
  }
  function startRevAnim(slideEl) {
    const revs = slideEl._revs;
    let i = 0;
    function show() { slideEl._revContent.textContent = revs[i]; }
    show();
    activeRevTimer = setInterval(() => {
      i = (i + 1) % revs.length;
      show();
    }, 600);
  }
  function go(n) {
    stopRevAnim();
    idx = Math.max(0, Math.min(slides.length - 1, n));
    nodes.forEach((el, i) => el.classList.toggle('active', i === idx));
    document.getElementById('cur').textContent = idx + 1;
    const cur = nodes[idx];
    if (cur._revs) startRevAnim(cur);
  }
  if (nodes[0]._revs) startRevAnim(nodes[0]);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); go(idx + 1); }
    else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(idx - 1); }
    else if (e.key === 'Home') { go(0); }
    else if (e.key === 'End') { go(slides.length - 1); }
  });
  document.addEventListener('click', (e) => {
    if (e.clientX < window.innerWidth / 2) go(idx - 1);
    else go(idx + 1);
  });
</script>
